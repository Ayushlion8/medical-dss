services:
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./agents:/app/agents
      - ./rag:/app/rag
      - ./api:/app/api
      - chroma_data:/app/chroma_db
      - uploads:/app/uploads
      - overlays:/app/overlays
    depends_on:
      - chromadb
    networks:
      - dss_net
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ui:
    build:
      context: ./ui
      dockerfile: ../infra/Dockerfile.ui
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - dss_net
    restart: unless-stopped

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - dss_net
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - ui
    networks:
      - dss_net
    restart: unless-stopped

volumes:
  chroma_data:
  uploads:
  overlays:

networks:
  dss_net:
    driver: bridge
